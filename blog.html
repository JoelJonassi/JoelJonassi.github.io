---
layout: page
title: Projects
---

<style>
    .posts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 24px;
        margin-top: 32px;
    }

    .post-card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 24px;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
    }

    .post-card:hover {
        box-shadow: var(--shadow-hover);
        transform: translateY(-4px);
    }

    .post-card h3 {
        margin: 0 0 12px 0;
        font-size: 18px;
        font-weight: 600;
    }

    .post-card h3 a {
        color: var(--text-primary);
        text-decoration: none;
    }

    .post-card h3 a:hover {
        color: var(--accent);
    }

    .post-card time {
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 12px;
    }

    .post-card p {
        color: var(--text-secondary);
        font-size: 14px;
        margin: 0;
    }
</style>

<div class="section-container">
    <div class="container">
        <div class="row">
            <div class="col-xs-12">
                <div class="text-center" style="max-width: 600px; margin: 0 auto;">
                    <h1 style="font-size: 36px; margin-bottom: 16px;">Projects</h1>
                    <p style="color: var(--text-secondary); font-size: 16px;">Welcome to my portfolio! View my most recent projects, which highlight my innovative thinking and practical solutions.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="container posts">
        <div class="posts-grid">
            {% for post in site.posts %}
            <div class="post-card">
                <h3><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h3>
                <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%b %d, %Y" }}</time>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
