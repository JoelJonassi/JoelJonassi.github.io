---
layout: page
title: Blog
---

<style>
    .blog-header {
        text-align: center;
        max-width: 600px;
        margin: 0 auto 48px;
    }

    .blog-header h1 {
        font-size: 36px;
        margin-bottom: 16px;
    }

    .blog-header p {
        color: var(--text-secondary);
        font-size: 16px;
    }

    .blog-filters {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 40px;
        flex-wrap: wrap;
    }

    .blog-filter-btn {
        padding: 8px 16px;
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        color: var(--text-secondary);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .blog-filter-btn:hover {
        background: var(--bg-secondary);
        color: var(--accent);
        border-color: var(--accent);
    }

    .blog-filter-btn.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
    }

    .blog-list {
        max-width: 720px;
        margin: 0 auto;
    }

    .blog-item {
        display: flex;
        align-items: baseline;
        gap: 16px;
        padding: 12px 0;
        border-bottom: 1px solid var(--border-color);
        transition: opacity 0.2s ease;
    }

    .blog-item:last-child {
        border-bottom: none;
    }

    .blog-item time {
        font-size: 13px;
        color: var(--text-secondary);
        white-space: nowrap;
        flex-shrink: 0;
        min-width: 60px;
    }

    .blog-item a {
        color: var(--text-primary);
        font-size: 15px;
        font-weight: 500;
        text-decoration: none;
        transition: color 0.2s ease;
    }

    .blog-item a:hover {
        color: var(--accent);
    }

    .blog-item.hidden {
        display: none;
    }

    /* Pagination */
    .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 48px;
        flex-wrap: wrap;
    }

    .pagination button {
        min-width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .pagination button:hover:not(:disabled) {
        background: var(--bg-secondary);
        color: var(--accent);
        border-color: var(--accent);
    }

    .pagination button.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
    }

    .pagination button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }

    .pagination .page-info {
        color: var(--text-secondary);
        font-size: 13px;
        margin: 0 16px;
    }

    @media (max-width: 768px) {
        .blog-item {
            gap: 12px;
        }
        .blog-item a {
            font-size: 14px;
        }
    }
</style>

<div class="section-container">
    <div class="container">
        <div class="blog-header">
            <h1>Blog</h1>
            <p>Thoughts on what I'm building, what I'm learning, and where technology is heading.</p>
        </div>

        <div class="blog-filters">
            <button class="blog-filter-btn active" onclick="filterPosts('all')">All</button>
            <button class="blog-filter-btn" onclick="filterPosts('findings')">Findings</button>
            <button class="blog-filter-btn" onclick="filterPosts('work-in-progress')">Work in Progress</button>
            <button class="blog-filter-btn" onclick="filterPosts('trends')">Trends</button>
        </div>

        <div class="blog-list" id="blog-container">
            {% for post in site.blog %}
            <div class="blog-item" data-category="{{ post.category }}" data-page="{{ forloop.index0 | divided_by: 10 | plus: 1 }}">
                <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%b %Y" }}</time>
                <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
            </div>
            {% endfor %}
        </div>

        <div class="pagination" id="pagination"></div>
    </div>
</div>

<script>
    const postsPerPage = 10;
    let allCards = document.querySelectorAll('.blog-item');
    let filteredCards = [...allCards];
    let totalPages = Math.ceil(filteredCards.length / postsPerPage);
    let currentPage = 1;

    function filterPosts(category) {
        document.querySelectorAll('.blog-filter-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.textContent.toLowerCase().replace(/\s+/g, '-') === category || 
                (category === 'all' && btn.textContent === 'All')) {
                btn.classList.add('active');
            }
        });

        allCards.forEach(card => {
            if (category === 'all' || card.dataset.category === category) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        });

        filteredCards = [...allCards].filter(card => 
            category === 'all' || card.dataset.category === category
        );
        totalPages = Math.ceil(filteredCards.length / postsPerPage);
        currentPage = 1;
        showPage(1);
    }

    function showPage(page) {
        currentPage = page;
        const start = (page - 1) * postsPerPage;
        const end = start + postsPerPage;

        filteredCards.forEach((card, index) => {
            if (index >= start && index < end) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        });

        updatePagination();
    }

    function updatePagination() {
        const pagination = document.getElementById('pagination');
        pagination.innerHTML = '';

        if (totalPages <= 1) return;

        const prevBtn = document.createElement('button');
        prevBtn.innerHTML = '<i class="bi bi-chevron-left"></i>';
        prevBtn.onclick = () => showPage(currentPage - 1);
        prevBtn.disabled = currentPage === 1;
        pagination.appendChild(prevBtn);

        for (let i = 1; i <= totalPages; i++) {
            if (totalPages <= 7 || i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.className = i === currentPage ? 'active' : '';
                btn.onclick = () => showPage(i);
                pagination.appendChild(btn);
            } else if (i === currentPage - 2 || i === currentPage + 2) {
                const ellipsis = document.createElement('span');
                ellipsis.textContent = '...';
                ellipsis.style.cssText = 'padding: 0 8px; color: var(--text-secondary);';
                pagination.appendChild(ellipsis);
            }
        }

        const nextBtn = document.createElement('button');
        nextBtn.innerHTML = '<i class="bi bi-chevron-right"></i>';
        nextBtn.onclick = () => showPage(currentPage + 1);
        nextBtn.disabled = currentPage === totalPages;
        pagination.appendChild(nextBtn);
    }

    showPage(1);
</script>
