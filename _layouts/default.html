    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --accent: #0563bb;
            --accent-light: #f0f4f8;
            --border-color: #e5e5e5;
            --card-bg: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-hover: 0 4px 16px rgba(0,0,0,0.12);
        }

        [data-theme="dark"] {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --accent: #4d9fff;
            --accent-light: #1a2a3a;
            --border-color: #2a2a2a;
            --card-bg: #121212;
            --nav-bg: rgba(10, 10, 10, 0.95);
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-hover: 0 4px 16px rgba(0,0,0,0.4);
        }

        * {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 600;
            color: var(--text-primary);
        }

        a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .template-example p {
            color: var(--text-secondary);
        }

        .hero-full-container {
            background-color: var(--bg-secondary);
        }

        .background-image-container {
            background-color: var(--bg-secondary);
        }

        .footer-container {
            background-color: var(--bg-secondary);
        }

        .footer-container p {
            color: var(--text-secondary);
        }

        .navbar {
            background-color: var(--nav-bg) !important;
            box-shadow: var(--shadow);
        }

        .navbar-inverse {
            border-bottom: 1px solid var(--border-color);
        }

        .nav > li > a {
            color: var(--text-secondary) !important;
            font-weight: 500;
        }

        .nav > li > a:hover {
            color: var(--accent) !important;
            background-color: transparent !important;
        }

        .section-container {
            padding: 60px 0;
        }

        .posts ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .posts li {
            margin-bottom: 16px;
            padding: 16px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .posts li:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .posts a {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 16px;
        }

        .posts a:hover {
            color: var(--accent);
            text-decoration: none;
        }

        .posts time {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .resume-item {
            padding: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .theme-toggle {
            cursor: pointer;
            font-size: 20px;
            padding: 8px 12px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            background: var(--bg-secondary);
            color: var(--accent);
        }

        .pdf-page {
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            margin-left: 1%;
            margin-right: 2%;
            width: 100%;
            background: var(--card-bg);
        }

        @media (max-width: 768px) {
            .section-container {
                padding: 40px 0;
            }
        }
    </style>
</head>

<script>
    function setTheme(theme) {
      if (theme === "dark") {
        document.documentElement.setAttribute('data-theme', 'dark');
        window.localStorage.setItem('theme', 'dark');
        document.getElementById("theme-toggle").innerHTML = '<i class="bi bi-sun"></i>';
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        window.localStorage.setItem('theme', 'light');
        document.getElementById("theme-toggle").innerHTML = '<i class="bi bi-moon"></i>';
      }
    }

    let theme = localStorage.getItem('theme');

    theme = theme || (window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light' : 'light');

    setTheme(theme);

    function modeSwitcher() {
      let currentMode = document.documentElement.getAttribute('data-theme');

      if (currentMode === "dark") {
        setTheme('light');
      } else {
        setTheme('dark');
      }
    }
  </script>
